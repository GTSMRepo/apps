<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GTSM Repo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d0e;
    --panel:#10171a;
    --panel-raised:#151e21;
    --hairline:#1e2b2e;
    --text:#e8f2f3;
    --muted:#7c9599;
    --muted-dim:#4d6367;
    --accent:#41c5db;
    --accent-dim:#2a828f;
    --warm:#fcda09;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{background:var(--bg);}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#04141a;}

  a{color:inherit;text-decoration:none;}

  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    overflow:hidden;
    border-bottom:1px solid var(--hairline);
    padding:64px 24px 40px;
  }
  .hero::before{
    content:"";
    position:absolute;inset:0;
    background-image:
      linear-gradient(180deg, rgba(10,13,14,.55) 0%, var(--bg) 92%),
      var(--header-img);
    background-size:cover;
    background-position:center 30%;
    filter:saturate(.7) brightness(.5);
    z-index:0;
  }
  .hero::after{
    content:"";
    position:absolute;inset:0;
    background:repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,.12) 3px
    );
    z-index:1;
    pointer-events:none;
  }
  .hero-inner{
    position:relative;
    z-index:2;
    max-width:920px;
    margin:0 auto;
    display:flex;
    gap:22px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .repo-icon{
    width:84px;height:84px;
    border-radius:20px;
    object-fit:cover;
    border:1px solid var(--hairline);
    box-shadow:0 12px 28px rgba(0,0,0,.5);
    flex-shrink:0;
    background:var(--panel);
  }
  .hero-text{flex:1;min-width:220px;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{
    content:"";
    width:6px;height:6px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    letter-spacing:-.01em;
    line-height:1.05;
  }
  .subtitle{
    color:var(--accent);
    font-size:15px;
    font-weight:500;
    margin-top:6px;
  }
  .description{
    color:var(--muted);
    font-size:14.5px;
    line-height:1.6;
    margin-top:14px;
    max-width:58ch;
  }

  .add-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:24px;
    position:relative;
    z-index:2;
  }
  .btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    font-weight:500;
    padding:11px 18px;
    border-radius:10px;
    border:1px solid var(--hairline);
    background:var(--panel-raised);
    color:var(--text);
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:border-color .15s ease, transform .1s ease;
  }
  .btn:hover{border-color:var(--accent-dim);}
  .btn:active{transform:translateY(1px);}
  .btn-primary{
    background:var(--accent);
    color:#04141a;
    border-color:var(--accent);
    font-weight:600;
  }
  .btn-primary:hover{background:#5ad2e5;border-color:#5ad2e5;}
  .btn small{opacity:.65;font-weight:400;}

  /* ---------- STATS STRIP ---------- */
  .stats{
    max-width:920px;
    margin:0 auto;
    padding:18px 24px;
    display:flex;
    gap:32px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--hairline);
  }
  .stat{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted);}
  .stat b{color:var(--text);font-weight:600;}

  /* ---------- CATALOG ---------- */
  main{max-width:920px;margin:0 auto;padding:36px 24px 80px;}
  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted-dim);
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid var(--hairline);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(272px,1fr));
    gap:14px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--hairline);
    border-radius:14px;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    position:relative;
    transition:border-color .15s ease, transform .12s ease;
  }
  .card:hover{border-color:var(--accent-dim);transform:translateY(-2px);}
  .card-top{display:flex;gap:12px;align-items:flex-start;}
  .app-icon{
    width:56px;height:56px;
    border-radius:13px;
    object-fit:cover;
    flex-shrink:0;
    background:var(--panel-raised);
    border:1px solid var(--hairline);
  }
  .app-name-row{flex:1;min-width:0;}
  .app-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    line-height:1.25;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-dev{font-size:12px;color:var(--muted);margin-top:2px;}
  .app-subtitle{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    padding:3px 8px;
    border-radius:6px;
    background:var(--panel-raised);
    border:1px solid var(--hairline);
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.04em;
  }
  .badge.featured{color:var(--warm);border-color:rgba(252,218,9,.35);}
  .badge.category{color:var(--accent);border-color:rgba(65,197,219,.35);}

  .readout{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--muted-dim);
    padding-top:10px;
    border-top:1px dashed var(--hairline);
    display:flex;
    justify-content:space-between;
    gap:8px;
    flex-wrap:wrap;
  }
  .readout span{color:var(--muted);}

  .get-btn{
    margin-top:2px;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    font-weight:500;
    padding:9px;
    border-radius:8px;
    background:var(--panel-raised);
    border:1px solid var(--hairline);
    color:var(--text);
  }
  .get-btn:hover{border-color:var(--accent);color:var(--accent);}

  footer{
    max-width:920px;
    margin:0 auto;
    padding:0 24px 60px;
    color:var(--muted-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
  }
  footer a{color:var(--accent-dim);}
  footer a:hover{color:var(--accent);}

  .empty{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:40px 0;}

  @media (max-width:520px){
    .hero{padding:48px 18px 32px;}
    .stats{padding:16px 18px;}
    main{padding:28px 18px 60px;}
  }
</style>
</head>
<body>

  <section class="hero" id="hero">
    <div class="hero-inner">
      <img class="repo-icon" id="repoIcon" src="" alt="">
      <div class="hero-text">
        <div class="eyebrow">Sideload source · online</div>
        <h1 id="repoName">Loading repo…</h1>
        <div class="subtitle" id="repoSubtitle"></div>
        <p class="description" id="repoDescription"></p>
        <div class="add-row" id="addRow"></div>
      </div>
    </div>
  </section>

  <div class="stats" id="statsRow"></div>

  <main>
    <div class="section-label" id="catalogLabel">Catalog</div>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    <span>Source URL: <a id="footerSourceUrl" href="#">apps.json</a></span>
    <span id="footerWebsite"></span>
  </footer>

<script>
// ---- fallback copy, used only if apps.json can't be fetched (e.g. opened as a local file) ----
const FALLBACK_DATA = {"name": "GTSM Repo", "subtitle": "Goated Titty Sucking Method Repo", "description": "iPA\u2019s of apps I want to save and that are useful to me and wanna share. I will try to update most if updates come out for them. (I use a paid certificate)", "iconURL": "https://i.imgur.com/6hyeC83.png", "website": "https://guns.lol/lu1be", "patreonURL": "", "tintColor": "#41c5db", "featuredApps": ["com.spotify.client", "com.spanishfreddy.cupheadios", "com.robtop.geometryjump"], "headerURL": "https://i.imgur.com/vA2i2Hc.png", "apps": [{"name": "Cuphead iOS", "bundleIdentifier": "com.spanishfreddy.cupheadios", "marketplaceID": "", "developerName": "SpanishFreddy", "subtitle": "You NEED 3GB of ram to run it. ", "localizedDescription": "cuphead port made by spanishfreddy\nVERY HEAVY\nRECOMMEND FROM iPHONE 11 to the latest iphone. For iPads. Just make sure it has more than 3gb of RAM", "iconURL": "https://i.imgur.com/9rc9HkG.png", "tintColor": "#fccc13", "category": "games", "screenshots": [], "versions": [{"downloadURL": "https://www.mediafire.com/file/t7eanym4um9p5x2/Cuphead.ipa/file?dkey=xlw61i8lwnf&r=1903", "size": 2229700000, "version": "1.55", "buildVersion": null, "date": "2026-06-08T01:07:00-07:00", "localizedDescription": "", "minOSVersion": "18.0"}], "appPermissions": {"entitlements": [], "privacy": {}}, "patreon": {}}, {"name": "Geometry Dash", "bundleIdentifier": "com.robtop.geometryjump", "marketplaceID": "", "developerName": "RobTop Games AB", "subtitle": "An awesome app.", "localizedDescription": "Geometry dash full unlocked cause why not. Lol.", "iconURL": "https://i.imgur.com/SqswG13.png", "tintColor": "#fcda09", "category": "games", "screenshots": [], "versions": [{"downloadURL": "https://www.mediafire.com/file/64bren3p67fzr6i/Geometry_Dash_2.208_latest.ipa/file", "size": 145300000, "version": "2.208", "buildVersion": null, "date": "2026-02-21T00:20:00-08:00", "localizedDescription": "The tuff jumping game full", "minOSVersion": "12.0"}], "appPermissions": {"entitlements": [], "privacy": {}}, "patreon": {}}, {"name": "Spotify", "bundleIdentifier": "com.spotify.client", "marketplaceID": "", "developerName": "Example Developer", "subtitle": "An awesome app", "localizedDescription": "This is an awesome app only available on AltStore.", "iconURL": "https://i.imgur.com/hiYkP7A.png", "tintColor": "#1cd464", "category": "entertainment", "screenshots": [], "versions": [{"version": "9.1.0", "date": "2025-11-12T00:20:00-08:00", "localizedDescription": "tuff eeveespotify that unlocks premium and has working widget and everything works", "downloadURL": "https://www.mediafire.com/file/doa7153jw6y6xyt/EeveeSpotify_v9.1.0_Patched_%2528blatant_Widget_fix%2529.ipa/file?dkey=reim82o1pde&r=1361", "size": 94100000, "buildVersion": "", "minOSVersion": "16.0"}], "appPermissions": {"entitlements": [], "privacy": {}}, "patreon": {}}], "news": []};

const SOURCE_FILE = "apps.json";

function bytesToSize(bytes){
  if(!bytes) return null;
  const units = ["B","KB","MB","GB"];
  let i = 0, val = bytes;
  while(val >= 1024 && i < units.length-1){ val /= 1024; i++; }
  return `${val.toFixed(val < 10 && i>0 ? 1 : 0)} ${units[i]}`;
}

function formatDate(iso){
  if(!iso) return null;
  const d = new Date(iso);
  if(isNaN(d)) return null;
  return d.toLocaleDateString(undefined,{year:'2-digit',month:'short',day:'2-digit'});
}

function altstoreURL(sourceURL){
  return `altstore://source?url=${encodeURIComponent(sourceURL)}`;
}
function sidestoreURL(sourceURL){
  return `sidestore://source?url=${encodeURIComponent(sourceURL)}`;
}
function featherURL(sourceURL){
  return `feather://source?url=${encodeURIComponent(sourceURL)}`;
}

function render(data){
  const sourceURL = new URL(SOURCE_FILE, window.location.href).href;

  document.title = data.name || "App Repo";
  document.getElementById('repoIcon').src = data.iconURL || '';
  document.getElementById('repoIcon').alt = data.name || '';
  document.getElementById('repoName').textContent = data.name || 'Untitled Repo';
  document.getElementById('repoSubtitle').textContent = data.subtitle || '';
  document.getElementById('repoDescription').textContent = data.description || '';

  if(data.headerURL){
    document.getElementById('hero').style.setProperty('--header-img', `url("${data.headerURL}")`);
  }

  // add-to-store buttons
  const addRow = document.getElementById('addRow');
  addRow.innerHTML = `
    <a class="btn btn-primary" href="${altstoreURL(sourceURL)}">Add to AltStore</a>
    <a class="btn" href="${sidestoreURL(sourceURL)}">Add to SideStore</a>
    <a class="btn" href="${featherURL(sourceURL)}">Add to Feather</a>
    <a class="btn" href="${sourceURL}" id="copySourceBtn">Copy source URL <small>⌘C</small></a>
  `;
  document.getElementById('copySourceBtn').addEventListener('click', (e)=>{
    e.preventDefault();
    navigator.clipboard?.writeText(sourceURL).catch(()=>{});
    const el = e.currentTarget;
    const original = el.innerHTML;
    el.innerHTML = 'Copied ✓';
    setTimeout(()=>{ el.innerHTML = original; }, 1400);
  });

  // footer
  document.getElementById('footerSourceUrl').textContent = sourceURL;
  document.getElementById('footerSourceUrl').href = sourceURL;
  if(data.website){
    document.getElementById('footerWebsite').innerHTML = `<a href="${data.website}" target="_blank" rel="noopener">${data.website.replace(/^https?:\/\//,'')}</a>`;
  }

  // stats strip
  const apps = data.apps || [];
  const totalSize = apps.reduce((sum,a)=>{
    const v = (a.versions||[])[0];
    return sum + (v?.size || 0);
  },0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><b>${apps.length}</b> app${apps.length===1?'':'s'}</div>
    <div class="stat"><b>${(data.featuredApps||[]).length}</b> featured</div>
    <div class="stat"><b>${bytesToSize(totalSize) || '0 B'}</b> total</div>
  `;

  // catalog
  document.getElementById('catalogLabel').textContent = `Catalog — ${apps.length} app${apps.length===1?'':'s'}`;
  const grid = document.getElementById('grid');

  if(apps.length === 0){
    grid.innerHTML = '';
    grid.parentElement.insertAdjacentHTML('beforeend','<div class="empty">$ no apps in this source yet</div>');
    return;
  }

  grid.innerHTML = apps.map(app=>{
    const v = (app.versions||[])[0] || {};
    const isFeatured = (data.featuredApps||[]).includes(app.bundleIdentifier);
    const size = bytesToSize(v.size);
    const date = formatDate(v.date);
    return `
      <div class="card">
        <div class="card-top">
          <img class="app-icon" src="${app.iconURL||''}" alt="" loading="lazy"
               style="${app.tintColor ? `box-shadow:0 0 0 1px ${app.tintColor}33;` : ''}">
          <div class="app-name-row">
            <div class="app-name">${escapeHTML(app.name||'Untitled')}</div>
            <div class="app-dev">${escapeHTML(app.developerName||'Unknown developer')}</div>
          </div>
        </div>
        ${app.subtitle ? `<div class="app-subtitle">${escapeHTML(app.subtitle)}</div>` : ''}
        <div class="badge-row">
          ${isFeatured ? '<span class="badge featured">★ featured</span>' : ''}
          ${app.category ? `<span class="badge category">${escapeHTML(app.category)}</span>` : ''}
          ${v.minOSVersion ? `<span class="badge">iOS ${v.minOSVersion}+</span>` : ''}
        </div>
        <div class="readout">
          <span>v${escapeHTML(v.version||'—')}</span>
          <span>${size || '—'}</span>
          <span>${date || ''}</span>
        </div>
        ${v.downloadURL ? `<a class="get-btn" href="${v.downloadURL}">Download .ipa</a>` : ''}
      </div>
    `;
  }).join('');
}

function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

// try to load the live apps.json next to this page; fall back to embedded copy
fetch(SOURCE_FILE, {cache:'no-store'})
  .then(r => { if(!r.ok) throw new Error('not ok'); return r.json(); })
  .then(render)
  .catch(() => render(FALLBACK_DATA));
</script>
</body>
</html>
